name: Lint
permissions:
  contents: read

on:
 push:
   branches:
     - main
   tags: "*"
 pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install tox
        run: pip install tox
      - name: Check style
        run: tox -e style
